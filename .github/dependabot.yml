version: 2
updates:
  # cordon owns the reusable gate, whose actions are SHA-pinned. Dependabot bumps
  # those pins (and the comment) so no one pins actions by hand. Monthly is plenty.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions"]

  # The engine's own Node deps (ajv).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels: ["dependencies", "javascript"]
