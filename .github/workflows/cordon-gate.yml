# The one cordon gate — reused by every Severino repo.
#
# A repo runs the whole standard gate by calling this in three lines (see
# docs/REUSABLE-GATE.md), with NOTHING repo-specific in its workflow:
#
#   jobs:
#     cordon:
#       uses: joeseverino/cordon/.github/workflows/cordon-gate.yml@main
#
# Every caller's ci.yml is that identical bare call. Per-repo CI parameters live
# in the one data file, cordon.checks.json — never in the workflow:
#   { "runner": "macos-latest", "packages": "bash zsh bats-core age jq" }
# `runner` defaults to ubuntu-latest; `packages` are extra brew/apt tooling beyond
# the shellcheck + ripgrep base (brew formulae on macOS, apt names on Linux). The
# `detect` job reads them first, because runs-on can't read a repo file mid-job.
#
# The gate then checks the caller out, brings cordon's engine + schema along,
# auto-detects the stack (Python → uv deps, Node → npm deps), and runs cordon's
# checks engine over cordon.checks.json folded with cordon's repo invariants into
# one verdict. Required status check, identical everywhere: `cordon / gate`.
name: cordon gate

on:
  workflow_call:
    inputs:
      cordon-ref:
        description: "Which cordon ref provides the engine + schema (default: main)."
        type: string
        default: main

permissions:
  contents: read

jobs:
  # Runner + extra tooling are data (cordon.checks.json), not workflow inputs — so
  # every caller's ci.yml stays the identical bare gate call. runs-on can't read a
  # repo file mid-job, so this tiny job reads them first and hands them to `gate`.
  detect:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.cfg.outputs.runner }}
      packages: ${{ steps.cfg.outputs.packages }}
    steps:
      - name: Check out the calling repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Read runner + packages from cordon.checks.json
        id: cfg
        run: |
          runner=ubuntu-latest
          packages=""
          if [ -f cordon.checks.json ]; then
            runner=$(jq -r '.runner // "ubuntu-latest"' cordon.checks.json)
            packages=$(jq -r '.packages // ""' cordon.checks.json)
          fi
          echo "runner=$runner"     >> "$GITHUB_OUTPUT"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  gate:
    needs: detect
    runs-on: ${{ needs.detect.outputs.runner }}
    steps:
      - name: Check out the calling repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check out cordon (engine + schema — never vendored)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: joeseverino/cordon
          ref: ${{ inputs.cordon-ref }}
          path: .cordon

      - name: Set up Node (the engine runs on it)
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Install cordon's engine deps
        run: npm --prefix .cordon ci

      - name: Set up uv (Python repos only)
        if: ${{ hashFiles('pyproject.toml') != '' }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync Python deps (Python repos only)
        if: ${{ hashFiles('pyproject.toml') != '' }}
        run: uv sync --extra dev || uv sync || true

      - name: Install the caller's npm deps (Node repos only)
        # The caller is checked out at the workspace root; .cordon is the engine.
        # A repo with a lockfile gets its own deps so node-based checks (catalog
        # `check:*` scripts, stylelint, a `commands[]` spec like tsc) can run.
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Provision check tooling
        env:
          EXTRA_PACKAGES: ${{ needs.detect.outputs.packages }}
        run: |
          # shellcheck (shell repos) + ripgrep (some test suites shell out to it),
          # plus any caller-declared `packages` (from cordon.checks.json). OS-aware:
          # brew on macOS, apt on Linux. `|| true`: a broken preinstalled third-party
          # repo must not fail the gate — the base tools come from the always-present
          # archive.
          base="shellcheck ripgrep"
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install $base $EXTRA_PACKAGES || true
          else
            sudo apt-get update -qq || true
            sudo apt-get install -y $base $EXTRA_PACKAGES || true
          fi

      - name: Run cordon checks
        env:
          CORDON_HOME: ${{ github.workspace }}/.cordon
        run: |
          node "$CORDON_HOME/checks/run.mjs" --root "$PWD"; status=$?
          [ -f .cordon-checks-report.md ] && cat .cordon-checks-report.md >> "$GITHUB_STEP_SUMMARY"
          exit $status
