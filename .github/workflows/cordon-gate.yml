# The one cordon gate — reused by every Severino repo.
#
# This is the single place CI logic lives. A repo runs the whole standard gate by
# calling this workflow in three lines (see docs/REUSABLE-GATE.md):
#
#   jobs:
#     cordon:
#       uses: joeseverino/cordon/.github/workflows/cordon-gate.yml@main
#
# It checks the caller out, brings cordon's engine + schema along, auto-detects
# the stack (Python → uv deps, Node → npm deps; everything gets node + shellcheck
# + ripgrep), then runs cordon's checks engine over the caller's own
# cordon.checks.json — the repo's commands (ruff, pytest, …) declared as data —
# folded with cordon's built-in repo invariants into one verdict. Change the gate
# for every repo by editing this file; change a repo's commands by editing its
# cordon.checks.json. Nothing is copied per repo, and every repo — on Linux or
# (via `runner: macos-latest`) macOS — reports the same status check: `cordon / gate`.
#
# Inputs: `runner` (default ubuntu-latest) and `packages` (extra brew/apt tooling)
# let a repo that needs macOS or a specific toolchain still ride the one gate.
name: cordon gate

on:
  workflow_call:
    inputs:
      cordon-ref:
        description: "Which cordon ref provides the engine + schema (default: main)."
        type: string
        default: main
      runner:
        description: "Runner image. Default ubuntu-latest; pass macos-latest for repos that need macOS (Keychain, a brew toolchain)."
        type: string
        default: ubuntu-latest
      packages:
        description: "Extra check tooling to install beyond shellcheck + ripgrep, space-separated (apt names on Linux, brew formulae on macOS). e.g. 'bats-core age'."
        type: string
        default: ""

permissions:
  contents: read

jobs:
  gate:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Check out the calling repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Fetch cordon (engine + schema — OUTSIDE the caller's tree)
        # Cloned into RUNNER_TEMP, never a path inside the caller's workspace: a
        # repo whose own tooling scans the working tree (a generated README/repo
        # inventory, a "list every dir" check) must not see cordon's files as if
        # they were the repo's. cordon is public, so no auth; shallow for speed.
        run: git clone --depth 1 --branch "${{ inputs.cordon-ref }}" https://github.com/joeseverino/cordon "$RUNNER_TEMP/cordon"

      # Honor the caller's Node pin (.nvmrc) so the Repository Policy nvmrc check
      # agrees and the caller's checks run on the Node they target; fall back to
      # 24 when a repo pins nothing. cordon's engine runs on the fleet's pinned
      # majors. Two steps, not one ternary: a GitHub Actions `&& '' || '24'`
      # expression returns '24' even when .nvmrc exists (empty string is falsy),
      # and a non-empty node-version overrides node-version-file.
      #
      # setup-node v5 also defaults its package-manager cache on, auto-detecting
      # `packageManager` in package.json — a pnpm repo then fails ("Unable to
      # locate executable file: pnpm") before corepack enables it. The gate
      # installs deps explicitly below, so disable that cache on both paths.
      - name: Set up Node from the caller's .nvmrc (pinned repos)
        if: ${{ hashFiles('.nvmrc') != '' }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Set up Node — default (repos with no .nvmrc)
        if: ${{ hashFiles('.nvmrc') == '' }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install cordon's engine deps
        run: npm --prefix "$RUNNER_TEMP/cordon" ci

      - name: Set up uv (Python repos only)
        if: ${{ hashFiles('pyproject.toml') != '' }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync Python deps (Python repos only)
        if: ${{ hashFiles('pyproject.toml') != '' }}
        run: uv sync --extra dev || uv sync || true

      - name: Install the caller's npm deps (npm repos only)
        # The caller owns the workspace root; cordon's engine lives in RUNNER_TEMP,
        # out of the tree. A repo with a lockfile gets its own deps so node-based
        # checks (catalog `check:*` scripts, stylelint, a `commands[]` spec like
        # tsc) can run.
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Install the caller's pnpm deps (pnpm repos only)
        # The fleet's Node standard is pnpm (corepack-pinned via `packageManager`).
        # corepack ships with Node, so enable it and let it honor the pinned pnpm;
        # --frozen-lockfile keeps CI reproducible. Mirrors the npm path above.
        if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Provision common check tooling
        env:
          EXTRA_PACKAGES: ${{ inputs.packages }}
        run: |
          # shellcheck (shell repos) + ripgrep (some test suites shell out to it),
          # plus any caller-declared `packages`. OS-aware: brew on macOS, apt on
          # Linux. `|| true`: a broken preinstalled third-party repo must not fail
          # the gate — the base tools come from the always-present archive.
          base="shellcheck ripgrep"
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install $base $EXTRA_PACKAGES || true
          else
            sudo apt-get update -qq || true
            sudo apt-get install -y $base $EXTRA_PACKAGES || true
          fi

      - name: Run cordon checks
        env:
          CORDON_HOME: ${{ runner.temp }}/cordon
        run: |
          node "$CORDON_HOME/checks/run.mjs" --root "$PWD"; status=$?
          [ -f .cordon-checks-report.md ] && cat .cordon-checks-report.md >> "$GITHUB_STEP_SUMMARY"
          exit $status
