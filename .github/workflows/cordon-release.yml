# The one cordon release workflow — reused by every Severino repo.
#
# Sibling of cordon-gate.yml: the gate answers "is this repo green?", this cuts
# the version when it is. Release logic — release-please, the pinned action, the
# token plumbing — lives here once. A repo releases by *calling* it:
#
#   jobs:
#     cordon:
#       uses: joeseverino/cordon/.github/workflows/cordon-release.yml@main
#
# On every push to main it maintains ONE standing "release PR"
# (`chore(main): release X.Y.Z`) whose version is computed from Conventional
# Commit titles since the last release (fix→patch, feat→minor, feat!/BREAKING→
# major; override with a `Release-As: X.Y.Z` commit line). Nothing ships until
# that PR is merged — merging it cuts the `vX.Y.Z` tag and the GitHub Release.
#
# `release-type` defaults to `simple` (a plain `version.txt`), so a brand-new
# repo needs ZERO config. A typed repo overrides it in one line:
#   with: { release-type: node }   # or python, go, …  (reads package.json etc.)
#
# ONE-TIME per-repo setting (required): Settings → Actions → General → Workflow
# permissions → "Allow GitHub Actions to create and approve pull requests".
# Without it the release PR cannot be opened. Full guide: docs/RELEASE.md.
name: cordon release

on:
  workflow_call:
    inputs:
      release-type:
        description: "release-please strategy: simple | node | python | go | …"
        type: string
        default: simple
    secrets:
      token:
        description: "Optional PAT/App token so the release PR re-triggers gated CI. Defaults to GITHUB_TOKEN."
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          release-type: ${{ inputs.release-type }}
          token: ${{ secrets.token || github.token }}
