name: conformance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm ci
      # The fixture sweep (every verdict/contract shape) AND the engine self-test
      # (invariants, command entries, capability gating, phases — and that the
      # live --json validates against the schema). One green badge, both proven.
      - name: Conformance + engine self-test
        run: npm test
      # cordon's checks engine over cordon — including the dogfooded idempotence
      # check that fails if checks/config.schema.json has drifted from its source
      # (the per-check configSchema declarations). The run report (the
      # whole-picture status table, green or red) is always surfaced in the run
      # summary; the same verdict is available as --json for an agent.
      - name: Checks (dogfood, guards the derived config schema)
        run: |
          node checks/run.mjs --root "$PWD"; status=$?
          [ -f .cordon-checks-report.md ] && cat .cordon-checks-report.md >> "$GITHUB_STEP_SUMMARY"
          exit $status
