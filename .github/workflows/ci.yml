name: conformance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm ci
      - name: Validate fixtures against the schema
        run: node conformance/validate.mjs
