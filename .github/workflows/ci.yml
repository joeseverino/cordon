# cordon rides its own reusable gate, like every repo in the fleet — so its
# check lines up too: `cordon / gate`. The conformance suite (npm test) and the
# config-schema idempotence guard are declared as checks in cordon.checks.json;
# the gate runs them. A LOCAL ref (./…) is used on purpose: a PR is gated by the
# gate + checks it actually ships, not by main's copy.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cordon:
    uses: ./.github/workflows/cordon-gate.yml
