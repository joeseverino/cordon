# release — cordon cuts its own versions through its own reusable workflow.
#
# This is the exact three-line call every consuming repo makes (see
# docs/RELEASE.md); cordon dogfoods it. The logic lives in cordon-release.yml.
# cordon is an npm package, so it overrides the default `simple` release-type
# with `node` (version read from package.json). Status check: `cordon / release`
# — the sibling of the gate's `cordon / gate`.
name: release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cordon:
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/cordon-release.yml
    with:
      release-type: node
